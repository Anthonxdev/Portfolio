name: Deploy to BanaHosting

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.blognoticiasinforma.com
          port: 21
          username: anthonx.dev@anthonx.dev
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /home/urczabyi/anthonx.dev/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
